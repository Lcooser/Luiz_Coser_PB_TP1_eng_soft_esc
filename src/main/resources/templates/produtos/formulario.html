<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${produto.id != null && !produto.id.isEmpty()} ? 'Editar produto' : 'Novo produto'">Formulário</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="layout">
    <header class="header">
        <h1>Sistema de Produtos</h1>
        <nav>
            <a th:href="@{/produtos}">Listar</a>
            <a th:href="@{/produtos/novo}">Novo produto</a>
        </nav>
    </header>
    <main class="main">
        <div th:if="${sucesso}" class="alert alert-sucesso" th:text="${sucesso}" id="mensagem-sucesso"></div>
        <div th:if="${erro}" class="alert alert-erro" th:text="${erro}" id="mensagem-erro"></div>
        <h2 th:text="${produto.id != null && !produto.id.isEmpty()} ? 'Editar produto' : 'Novo produto'">Formulário</h2>
        <form th:action="@{/produtos}" th:object="${produto}" method="post" id="form-produto">
            <div class="form-group">
                <label for="id">ID</label>
                <input type="number" id="id" th:field="*{id}" min="1" step="1"/>
            </div>
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" th:field="*{nome}"/>
            </div>
            <div class="form-group">
                <label for="descricao">Descrição</label>
                <input type="text" id="descricao" th:field="*{descricao}"/>
            </div>
            <div class="form-group">
                <label for="preco">Preço</label>
                <input type="number" id="preco" th:field="*{preco}" step="0.01"/>
            </div>
            <div class="form-group">
                <label for="quantidadeEstoque">Quantidade em estoque</label>
                <input type="number" id="quantidadeEstoque" th:field="*{quantidadeEstoque}" step="1"/>
            </div>
            <button type="submit" class="btn btn-salvar">Salvar</button>
            <a th:href="@{/produtos}" class="btn btn-cancelar">Cancelar</a>
        </form>
    </main>
</div>
</body>
</html>
